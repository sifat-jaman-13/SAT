name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build Phonebook
        run: gcc -Wall -Wextra -Werror -O2 "Phonebook.c" -o phonebook

      - name: Build Movie Management System
        run: gcc -Wall -Wextra -Werror -O2 "Movie Management System.c" -o movie_management
