name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW (GCC)
        run: |
          choco install mingw --yes --no-progress
          $searchRoot = "$env:ChocolateyInstall\lib\mingw"
          $mingwBins = Get-ChildItem -Path $searchRoot -Recurse -Directory -Filter bin
          $mingwBin = $mingwBins |
            Where-Object { Test-Path (Join-Path $_.FullName "gcc.exe") } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $mingwBin) { throw "Could not locate MinGW gcc.exe after installation. Searched under: $searchRoot" }
          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show GCC version
        run: |
          where.exe gcc
          gcc --version

      - name: Build Phonebook
        run: gcc -Wall -Wextra -Werror -O2 "Phonebook.c" -o phonebook.exe

      - name: Build Movie Management System
        run: gcc -Wall -Wextra -Werror -O2 "Movie Management System.c" -o movie_management.exe
